apiVersion: v1
kind: ServiceAccount
metadata:
  name: swarm-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: swarm-runner
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: swarm-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: swarm-runner
subjects:
  - kind: ServiceAccount
    name: swarm-runner
