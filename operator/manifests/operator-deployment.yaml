apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarmrun-operator
  labels:
    app: swarmrun-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swarmrun-operator
  template:
    metadata:
      labels:
        app: swarmrun-operator
    spec:
      serviceAccountName: swarmrun-operator
      containers:
        - name: operator
          image: swarmrun-operator:latest
          envFrom:
            - configMapRef:
                name: operator-config
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: beads-data
              mountPath: /data/beads
          resources:
            requests:
              memory: "256Mi"
              cpu: "0.25"
            limits:
              memory: "512Mi"
              cpu: "0.5"
      volumes:
        - name: beads-data
          persistentVolumeClaim:
            claimName: beads-data
