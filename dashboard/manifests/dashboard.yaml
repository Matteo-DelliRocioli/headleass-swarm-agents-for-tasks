apiVersion: v1
kind: ServiceAccount
metadata:
  name: swarm-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: swarm-dashboard
rules:
  - apiGroups:
      - swarm.agentswarm.io
    resources:
      - swarmruns
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: swarm-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: swarm-dashboard
subjects:
  - kind: ServiceAccount
    name: swarm-dashboard
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarm-dashboard
  labels:
    app: swarm-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swarm-dashboard
  template:
    metadata:
      labels:
        app: swarm-dashboard
    spec:
      serviceAccountName: swarm-dashboard
      containers:
        - name: dashboard
          image: swarm-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: "128Mi"
              cpu: "0.1"
            limits:
              memory: "256Mi"
              cpu: "0.25"
---
apiVersion: v1
kind: Service
metadata:
  name: swarm-dashboard
spec:
  type: NodePort
  selector:
    app: swarm-dashboard
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
